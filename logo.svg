<svg xmlns="http://www.w3.org/2000/svg" viewBox="35 35 390 130" width="390" height="130">
  <defs>
    <linearGradient id="capsuleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5BF5AC"/>
      <stop offset="50%" style="stop-color:#5BF5AC"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%" gradientTransform="rotate(45)">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.35"/>
      <stop offset="50%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <g transform="rotate(45, 100, 100)">
    <rect x="30" y="70" width="140" height="60" rx="30" ry="30" 
          fill="url(#capsuleGradient)" stroke="#0f0f1a" stroke-width="3"/>
    
    <rect x="32" y="72" width="136" height="28" rx="28" ry="14" 
          fill="url(#shine)"/>
    
    <line x1="100" y1="70" x2="100" y2="130" stroke="#0f0f1a" stroke-width="3"/>
  </g>
  
  <g fill="#5BF5AC" shape-rendering="crispEdges">
    <!-- > character -->
    <rect x="104" y="110" width="6" height="6"/>
    <rect x="110" y="116" width="6" height="6"/>
    <rect x="116" y="122" width="6" height="6"/>
    <rect x="110" y="128" width="6" height="6"/>
    <rect x="104" y="134" width="6" height="6"/>
    <!-- _ character -->
    <rect x="128" y="134" width="6" height="6"/>
    <rect x="134" y="134" width="6" height="6"/>
    <rect x="140" y="134" width="6" height="6"/>
  </g>
  
  <text x="167" y="152" 
        font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace" 
        font-size="44" 
        font-weight="500" 
        letter-spacing="-1" 
        fill="#1a1a2e">Supplement</text>
</svg>
